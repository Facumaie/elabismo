<style>

</style>

<script>
'use strict';
/* ================= idioma automático ================= */
const LANG=(navigator.language||'es').slice(0,2)==='es'?'es':'en';
const L=(es,en)=>LANG==='es'?es:en;
/* ================= utilidades ================= */
const $=id=>document.getElementById(id);
const R=(a,b)=>a+Math.random()*(b-a);
const RI=(a,b)=>Math.floor(R(a,b+1));
const ES=!navigator.language||navigator.language.startsWith('es');
const LOCALE=ES?'es-AR':'en-US';
const F=n=>Math.round(n).toLocaleString(LOCALE);
const dist2=(a,b)=>{const dx=a.x-b.x,dy=a.y-b.y;return dx*dx+dy*dy};
const store={get(k){try{return localStorage.getItem(k)}catch(e){return null}},
             set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};

/* ================= sprites (offscreen canvas, sin flickering) ================= */
const SPRITES={};
function makeCanvas(w,h){const c=document.createElement('canvas');c.width=w;c.height=h;return c}

function buildKnight(walk){
  const S=3,W=24*S,H=24*S,c=makeCanvas(W,H),x=c.getContext('2d');
  x.imageSmoothingEnabled=false;
  // Pixel data: each row is [y, [[x,w,color],...]]
  const K='#14161D',A='#5C6678',A2='#717C92',H1='#8A93A5',H2='#A0A8BC',SK='#E8D8C8',
        RD='#B42824',R2='#8A1E1E',GD='#D4A93C',G2='#A07B2E',SW='#C8CDD8',VR='#14161D',
        EY='#4DC0E8',BT='#2A2E3A',D1='#3A4150';
  function px(py,segs){segs.forEach(([sx,sw,col])=>{x.fillStyle=col;x.fillRect(sx*S,py*S,sw*S,S)})}
  // Plume
  px(0,[[9,3,RD]]);px(1,[[8,5,R2],[9,3,RD]]);
  // Helmet
  px(2,[[7,7,K]]);px(3,[[6,9,H1],[7,7,H2]]);px(4,[[6,9,H1],[8,5,A2]]);
  // Visor + eyes
  px(5,[[6,9,K],[7,1,VR],[8,1,EY],[9,1,VR],[10,1,EY],[11,1,VR],[12,1,VR]]);
  px(6,[[7,7,K],[8,5,VR]]);px(7,[[7,7,H1],[8,5,A]]);
  // Neck
  px(8,[[9,3,SK]]);
  // Cape + shoulders + armor

/* Knight: sprite de alta calidad desde sprite sheet */
(function(){
  const img=new Image();
  img.onload=()=>{
    const S=48,H=58;
    for(let i=0;i<4;i++){
      const c=makeCanvas(S,H),cx=c.getContext('2d');
      cx.drawImage(img,i*S,0,S,H,0,0,S,H);
      if(i<2)SPRITES[i===0?'ki':'kw']=c;
    }
    /* frame extra para walk */

/* Sprites HQ desde sprite sheets */
function loadHQSprite(keys, b64, fw, fh){
  const img=new Image();
  img.onload=()=>{
    for(let i=0;i<keys.length&&i<4;i++){
      const c=makeCanvas(fw,fh),cx=c.getContext('2d');
      cx.drawImage(img,i*fw,0,fw,fh,0,0,fw,fh);
      SPRITES[keys[i]]=c;
    }
  };
  img.src='data:image/png;base64,'+b64;

function tintColor(hex,bi){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const tints=[[0,0,0],[15,8,-5],[-10,8,-5],[30,-10,-15],[5,-5,20]];
  const t=tints[Math.min(4,bi)];
  return 'rgb('+Math.min(255,Math.max(0,r+t[0]))+','+Math.min(255,Math.max(0,g+t[1]))+','+Math.min(255,Math.max(0,b+t[2]))+')';
}

const AU={ctx:null,master:null,on:true,nbuf:null,
  init(){
    if(!this.ctx){
      try{
        this.ctx=new (window.AudioContext||window.webkitAudioContext)();
        this.master=this.ctx.createGain();this.master.gain.value=.32;
        this.master.connect(this.ctx.destination);
      }catch(e){this.on=false;return}
    }
    if(this.ctx.state==='suspended')this.ctx.resume();
  },
  beep(f0,f1,dur,type,vol,delay){
    if(!this.on||!this.ctx)return;
    const t=this.ctx.currentTime+(delay||0);
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.setValueAtTime(Math.max(1,f0),t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g);g.connect(this.master);o.start(t);o.stop(t+dur+.02);
  },
  noise(dur,vol,f0,f1,delay){
    if(!this.on||!this.ctx)return;
    const t=this.ctx.currentTime+(delay||0);
    if(!this.nbuf){
      const len=Math.floor(this.ctx.sampleRate*.5);
      const b=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=b.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
      this.nbuf=b;
    }
    const n=this.ctx.createBufferSource();n.buffer=this.nbuf;n.loop=true;
    const f=this.ctx.createBiquadFilter();f.type='bandpass';f.Q.value=1;
    f.frequency.setValueAtTime(Math.max(40,f0),t);
    f.frequency.exponentialRampToValueAtTime(Math.max(40,f1),t+dur);
    const g=this.ctx.createGain();
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    n.connect(f);f.connect(g);g.connect(this.master);
    n.start(t);n.stop(t+dur+.02);
  }
};

const ADS={
  ready:false, adCooldown:0, adDiv:null,
  init(){
    /* Verificar si AdSense cargó */
    if(typeof adsbygoogle!=='undefined'){this.ready=true;console.log('AdSense ready')}
    else console.log('AdSense no cargó, modo sin ads');
    /* Crear el contenedor del ad oculto */
    this.adDiv=document.getElementById('ad-slot');
  },
  canShow(){return this.ready&&this.adCooldown<=0},
  showRewarded(onComplete,onSkip){
    if(!this.canShow()){onComplete();return}
    /* AdSense no tiene rewarded nativo en web — simulamos con un interstitial
       y damos la recompensa al cerrarlo */
    this.showAdSlot(()=>{this.adCooldown=120;onComplete()},onSkip);
  },
  showInterstitial(){
    if(!this.canShow())return;
    this.showAdSlot(()=>{this.adCooldown=90},null);
  },
  showAdSlot(onDone,onSkip){
    if(!this.adDiv){if(onDone)onDone();return}
    /* Mostrar el overlay con el ad */
    const overlay=document.getElementById('ad-overlay');
    overlay.style.display='flex';
    this.adDiv.style.display='block';
    try{(adsbygoogle=window.adsbygoogle||[]).push({})}catch(e){}
    /* Botón cerrar aparece a los 5 segundos */
    const closeBtn=document.getElementById('ad-close');
    closeBtn.style.display='none';
    setTimeout(()=>{closeBtn.style.display='block'},5000);
    closeBtn.onclick=()=>{
      overlay.style.display='none';
      this.adDiv.style.display='none';
      if(onDone)onDone();
    };
  },
  tick(dt){if(this.adCooldown>0)this.adCooldown-=dt}
};
setTimeout(()=>ADS.init(),3000);

const LB={
  name:store.get('abismo_name')||'',
  cache:null,cacheT:0,
  localScores:JSON.parse(store.get('abismo_lb')||'[]'),
  setName(n){this.name=n.trim().slice(0,16).replace(/[<>"'&]/g,'');store.set('abismo_name',this.name)},
  async submit(score){
    /* guardar local siempre */
    this.localScores.push(score);
    this.localScores.sort((a,b)=>b.piso-a.piso||b.nivel-a.nivel||b.kills-a.kills);
    if(this.localScores.length>50)this.localScores.length=50;
    store.set('abismo_lb',JSON.stringify(this.localScores));
    /* intentar Firebase */
    if(!window._LB||!window._LB.ready)return;
    try{
      const{db,collection,addDoc}=window._LB;
      await addDoc(collection(db,'ranking'),score);
      this.cache=null;
    }catch(e){console.log('LB submit error',e)}
  },
  async fetch(){
    if(this.cache&&Date.now()-this.cacheT<30000)return this.cache;
    if(!window._LB||!window._LB.ready)return this.localScores.slice(0,20);
    try{
      const{db,collection,query,orderBy,limit,getDocs}=window._LB;
      const q=query(collection(db,'ranking'),orderBy('piso','desc'),orderBy('nivel','desc'),limit(20));
      const snap=await getDocs(q);
      const results=[];
      snap.forEach(d=>results.push(d.data()));
      this.cache=results;this.cacheT=Date.now();
      return results;
    }catch(e){console.log('LB fetch error',e);return this.localScores.slice(0,20)}
  }
};

  for(const sy of SINERGIAS){
    if(synActivas.includes(sy.k))continue;
    let ok=true;

      el.innerHTML='<div class="syn-t">'+sy.n+'</div><div class="syn-d">'+sy.d+'</div>';

      texto(P.x,P.y-80,L('¡SINERGIA DESBLOQUEADA!','SYNERGY UNLOCKED!'),'#FFD23C',20);
      for(let i=0;i<30;i++){const a=R(0,6.283),v=R(80,200);
        parts.push({x:P.x,y:P.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:R(.5,.9),col:'#FFD23C',r:R(2,5)})}
    }
  }
}

/* ===== SUPER: IRA DEL ABISMO ===== */
function trySuper(){
  if(state!=='run'||rage<rageMax)return;
  rage=0;sfxSuper();shake=20;
  /* daño masivo a todos los enemigos en pantalla */
  const dmg=playerDMG()*4;
  for(const e of enemigos){
    const dx=e.x-P.x,dy=e.y-P.y;
    if(dx*dx+dy*dy<(W*.7)*(W*.7)){
      golpear(e,dmg,true);
      const a=Math.atan2(dy,dx);
      if(e.hp>0&&!e.jefe){e.x+=Math.cos(a)*60;e.y+=Math.sin(a)*60}
    }
  }
  /* efecto visual: ondas + flash + partículas masivas */
  rings.push({x:P.x,y:P.y,r:30,vr:900,life:.55});
  rings.push({x:P.x,y:P.y,r:20,vr:600,life:.45});
  P.superFlash=.25;
  for(let i=0;i<60;i++){const a=R(0,6.283),v=R(120,400);
    parts.push({x:P.x,y:P.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:R(.4,1),col:['#FFD23C','#D44A42','#E8B33C','#FF8844'][i%4],r:R(2,6)})}
  texto(P.x,P.y-60,L('🔥 IRA DEL ABISMO 🔥','🔥 WRATH OF THE ABYSS 🔥'),'#FFD23C',26);
}

function abrirCofre(c){
  c.abierto=true;sfxChest();shake=6;dailyCofreCt++;
  chispa(c.x,c.y,'#E8B33C',25);
  const tipo=COFRE_CONTENIDO[RI(0,3)];
  if(tipo==='upgrade'){
    /* mejora gratis al azar */
    const pool=UPGRADES.filter(u=>ups[u.k]<u.max);
    if(pool.length){
      const u=pool[RI(0,pool.length-1)];
      ups[u.k]++;
      if(u.k==='hp'){P.hpMax+=30;P.hp=P.hpMax}
      if(u.k==='regen')P.regen=ups.regen*1.5;
      texto(c.x,c.y-30,'⬆ '+u.n+' nv'+ups[u.k]+'!','#4DC0E8',18);
      checkSinergias();
    } else {
      const g=200+piso*40;oroRun+=g;gstats.oroTotal+=g;
      texto(c.x,c.y-30,'+'+F(g)+' oro','#E8B33C',18);
    }
  } else if(tipo==='gold'){
    const g=Math.round((80+piso*30)*R(1,2.5));
    oroRun+=g;gstats.oroTotal+=g;
    for(let i=0;i<8;i++)monedas.push({x:c.x+R(-20,20),y:c.y+R(-20,20),v:Math.round(g/8),fly:false});
    texto(c.x,c.y-30,L('¡TESORO! +','TREASURE! +')+F(g)+' oro','#E8B33C',18);
  } else if(tipo==='tempBuff'){
    P.tempBuff={tipo:['dmg','spd','crit'][RI(0,2)],mult:1.5,dur:15};
    const nombres={dmg:L('🔥 +50% DAÑO','🔥 +50% DAMAGE'),spd:L('➤ +50% VELOCIDAD','➤ +50% SPEED'),crit:L('✛ +50% CRÍTICO','✛ +50% CRIT')};
    texto(c.x,c.y-30,nombres[P.tempBuff.tipo]+' (15s)','#3DC97E',18);
  } else {
    /* maldición: más enemigos pero más XP */
    P.cursed=15;
    texto(c.x,c.y-30,L('💀 MALDICIÓN: doble spawn, +80% XP (15s)','💀 CURSE: double spawn, +80% XP (15s)'),'#8B7CF0',15);
    sfxCurse();
  }
}

const hasRel=k=>reliquias.some(r=>r.k===k);

function dropRelic(x,y){
  if(reliquias.length>=3)return;
  const pool=RELIQUIAS.filter(r=>!hasRel(r.k));
  if(!pool.length)return;
  /* peso por rareza */
  const picks=[];
  for(const r of pool){const w=r.rar===3?1:r.rar===2?3:5;for(let i=0;i<w;i++)picks.push(r)}
  const rel=picks[RI(0,picks.length-1)];
  reliquias.push(rel);
  sfxSyn();shake=10;
  texto(x,y-30,rel.ic+' '+rel.n(),'#E8A23C',20);
  texto(x,y-50,RAR_NAM[rel.rar](),''+RAR_COL[rel.rar],14);
  for(let i=0;i<20;i++){const a=R(0,6.283),v=R(60,160);
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:R(.4,.8),col:RAR_COL[rel.rar],r:R(2,4)})}
}

function getDailyMissions(){
  const today=new Date().toISOString().slice(0,10);
  const DAILY_POOL=[
    {id:0, de:L('Eliminá 200 enemigos','Kill 200 enemies'),          k:'kills', meta:200},
    {id:1, de:L('Llegá al piso 8','Reach floor 8'),                  k:'piso',  meta:8},
    {id:2, de:L('Lográ un combo x20','Reach a x20 combo'),           k:'combo', meta:20},
    {id:3, de:L('Juntá 500 de oro','Collect 500 gold'),              k:'oro',   meta:500},
    {id:4, de:L('Matá 3 élites','Kill 3 elites'),                    k:'elite', meta:3},
    {id:5, de:L('Llegá a nivel 10','Reach level 10'),                k:'nivel', meta:10},
    {id:6, de:L('Derrotá 1 jefe','Defeat 1 boss'),                  k:'jefe',  meta:1},
    {id:7, de:L('Sobreviví 3 minutos','Survive 3 minutes'),          k:'time',  meta:180},
    {id:8, de:L('Activá FURIA 2 veces','Trigger FURY 2 times'),     k:'fury',  meta:2},
    {id:9, de:L('Abrí 2 cofres','Open 2 chests'),                   k:'cofre', meta:2},
  ];
  /* v2: clear old format */if(store.get('abismo_daily_v')!=='2'){store.set('abismo_daily',null);store.set('abismo_daily_v','2')}
const saved=store.get('abismo_daily');
  if(saved){
    try{
      const d=JSON.parse(saved);
      if(d.date===today){
        /* reconstruir funciones desde el pool */
        d.missions.forEach(m=>{const p=DAILY_POOL.find(x=>x.id===m.id);if(p)m.de=p.de});
        return d;
      }
    }catch(e){}
  }
  const seed=today.split('-').reduce((a,b)=>a*31+parseInt(b),0);
  const picks=[];const used=new Set();
  for(let i=0;i<3;i++){
    let idx=(seed*7+i*13+seed%(i+3))%DAILY_POOL.length;
    while(used.has(idx))idx=(idx+1)%DAILY_POOL.length;
    used.add(idx);
    const p=DAILY_POOL[idx];
    picks.push({id:p.id,de:p.de,k:p.k,meta:p.meta,prog:0,rew:30+i*15});
  }
  const data={date:today,missions:picks,claimed:[false,false,false]};
  store.set('abismo_daily',JSON.stringify(data));
  return data;
}
let dailyData=null;let dailyFuryCt=0,dailyCofreCt=0;
function updateDaily(){
  if(!dailyData)dailyData=getDailyMissions();
  if(!dailyData||!dailyData.missions)return;
  dailyData.missions.forEach((m,i)=>{
    if(dailyData.claimed[i])return;
    if(m.k==='kills')m.prog=killsTotal;
    if(m.k==='piso')m.prog=piso;
    if(m.k==='combo')m.prog=Math.max(m.prog,combo);
    if(m.k==='oro')m.prog=oroRun;
    if(m.k==='elite')m.prog=gstats.elites;
    if(m.k==='nivel')m.prog=nivel;
    if(m.k==='jefe')m.prog=gstats.bosses;
    if(m.k==='time')m.prog=Math.floor(tiempo);
    if(m.k==='fury')m.prog=dailyFuryCt;
    if(m.k==='cofre')m.prog=dailyCofreCt;
    if(m.prog>=m.meta&&!dailyData.claimed[i]){
      dailyData.claimed[i]=true;
      almas+=m.rew;guardar();
      if(P)texto(P.x,P.y-75,L('◈ DIARIA: +','◈ DAILY: +')+m.rew+' ✦','#4DC0E8',18);
      sfxLevel();
      store.set('abismo_daily',JSON.stringify(dailyData));
    }
  });
}
function dailyHTML(){
  if(!dailyData)dailyData=getDailyMissions();
  if(!dailyData||!dailyData.missions)return '';
  const rows=dailyData.missions.map((m,i)=>{
    const done=dailyData.claimed[i];
    const pct=Math.min(100,Math.round(m.prog/m.meta*100));
    return '<div class="misrow'+(done?' ok':'')+'"><span>'+(done?'✓ ':'')+m.de+
      '</span><b>'+(done?'✦'+m.rew:pct+'%')+'</b></div>';
  }).join('');
  return '<div class="secT">'+L('📅 MISIONES DIARIAS','📅 DAILY MISSIONS')+'</div><div class="mis">'+rows+'</div>';
}
function checkEvoluciones(){
  for(const ev of EVOLUCIONES){
    if(evolActivas.includes(ev.fx))continue;
    if((ups[ev.arma]||0)>=(UPGRADES.find(u=>u.k===ev.arma)?.max||99)){
      let ok=true;
      for(const[k,v]of Object.entries(ev.req)){if((ups[k]||0)<v){ok=false;break}}
      if(ok){
        evolActivas.push(ev.fx);
        sfxSyn();shake=18;
        const el=document.createElement('div');el.className='syn-banner';
        el.innerHTML='<div class="syn-t">'+ev.n+'</div><div class="syn-d">'+ev.d+'</div>';
        document.body.appendChild(el);
        setTimeout(()=>{el.style.transition='opacity .5s';el.style.opacity=0;setTimeout(()=>el.remove(),600)},3000);
        texto(P.x,P.y-90,L('¡EVOLUCIÓN!','EVOLUTION!'),'#FFD23C',24);
        for(let i=0;i<40;i++){const a=R(0,6.283),v2=R(100,260);
          parts.push({x:P.x,y:P.y,vx:Math.cos(a)*v2,vy:Math.sin(a)*v2,life:R(.6,1.1),col:'#FFD23C',r:R(2,6)})}
      }
    }
  }
}

function inputVec(){
  let x=0,y=0;
  if(keys['w']||keys['arrowup'])y-=1;
  if(keys['s']||keys['arrowdown'])y+=1;
  if(keys['a']||keys['arrowleft'])x-=1;
  if(keys['d']||keys['arrowright'])x+=1;
  if(joy.on){x=joy.dx;y=joy.dy}
  const m=Math.hypot(x,y);
  return m>0?{x:x/m*Math.min(1,m),y:y/m*Math.min(1,m)}:{x:0,y:0};
}

/* ================= helpers de juego ================= */
function texto(x,y,t,col,sz){textos.push({x,y,t,col,sz:sz||16,life:.9,vy:-55})}
function chispa(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,v=R(40,170);
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:R(.25,.55),col,r:R(1.5,3.5)})}}
function dropear(e){
  const mgem=mod&&mod.gem?mod.gem:1, moro=mod&&mod.oro?mod.oro:1;
  const val=Math.max(1,Math.round((e.jefe?20:e.elite?8:RI(1,3))*mgem));

  if(e.jefe||e.elite||Math.random()<.42){
    const g=Math.round((2+piso*1.6)*(e.jefe?20:e.elite?6:1)*(1+meta.gold)*moro*R(.7,1.4));
    monedas.push({x:e.x+R(-12,12),y:e.y+R(-12,12),v:g,fly:false});
  }
  if(!e.jefe&&Math.random()<.025)monedas.push({x:e.x,y:e.y,v:0,pot:true,fly:false});

function golpear(e,d,crit){
  if(crit&&hasSyn('verdugo'))d=d/2*3;
  if(hasRel('libro')&&(e.jefe||e.elite))d*=1.4;
  if(hasRel('espada')&&e.hp>0&&(e.hp-d)/e.hpMax<.2&&!e.jefe)d=e.hp;
  e.hp-=d;e.flash=.12;
  if(crit){sfxCrit();critStreak++;
    if(critStreak>=3&&!fury){fury=true;furyT=esBerserker()?8:5;critStreak=0;
      texto(P.x,P.y-55,L('🔥 ¡FURIA!','🔥 FURY!'),'#FF4444',24);dailyFuryCt++;shake=Math.max(shake,8);
      AU.beep(220,880,.3,'sawtooth',.25);AU.beep(440,1760,.3,'sawtooth',.2,.05)}}
  else{sfxHit();critStreak=0}
  texto(e.x+R(-10,10),e.y-e.r-6,(crit?'✛':'')+F(d),crit?'#E8B33C':'#F0EDE4',crit?20:15);
  const vampPct=playerVAMP()+(hasEvo('bloodDmg')?8:0);
  const cura=d*vampPct/100;
  if(cura>=1){
    if(P.hp>=P.hpMax&&hasSyn('pactosangre'))shield=Math.min(P.hpMax*.3,shield+cura);
    else P.hp=Math.min(P.hpMax,P.hp+cura);

function matar(e){

    for(const e2 of enemigos){
      if(e2===e||e2.hp<=0)continue;

  }
  if(sangre.length>60)sangre.splice(0,sangre.length-60);
  dropear(e);
  if(hasRel('hacha')&&P.hp<P.hpMax)P.hp=Math.min(P.hpMax,P.hp+3);

  if((e.n==='zombi'||e.n==='orco')&&!e.split&&!e.jefe&&e.r>13){

  killsTotal++;combo++;comboT=2;

    P.minions.push({x:e.x,y:e.y,atkT:0});

  }
  if(e.jefe){gstats.bosses++;dropRelic(e.x,e.y)}
  if(combo>gstats.comboMax)gstats.comboMax=combo;
  checkMisiones();
  if(e.jefe){
    boss=null;$('bossbar').style.display='none';shake=14;
    if(piso===PISO_FINAL){
      /* primer clear: bonus de almas + celebración, pero el juego SIGUE */

        texto(P.x,P.y-80,L('♛ ¡DEVORADOR DERROTADO!','♛ DEVOURER DEFEATED!'),'#FFD23C',26);
        texto(P.x,P.y-55,L('Modo infinito desbloqueado','Infinite mode unlocked'),'#4DC0E8',16);
        for(let i=0;i<50;i++){const a=R(0,6.283),v=R(100,300);
          parts.push({x:P.x,y:P.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:R(.6,1.2),col:['#FFD23C','#E8B33C','#4DC0E8','#8B7CF0'][i%4],r:R(2,6)})}

    texto(portal.x,portal.y-50,L('¡PORTAL ABIERTO!','PORTAL OPEN!'),'#4DC0E8',20);

/* ================= update ================= */
function update(dt){
  tiempo+=dt;
  ADS.tick(dt);
  if(Math.floor(tiempo)%5===0)updateDaily();
  /* stealth decay (asesina) */
  if(P.stealth){P.stealthT-=dt;if(P.stealthT<=0||P.swing>0)P.stealth=false}
  /* necro minions */
  if(esNecro()){
    if(!P.minions)P.minions=[]; if(P.minionKills==null)P.minionKills=0;
    if(P.minionKills>=15&&P.minions.length<4){
      P.minionKills=0;
      P.minions.push({x:P.x+R(-30,30),y:P.y+R(-30,30),atkT:0});
      texto(P.x,P.y-50,L('💀 ¡Esqueleto invocado!','💀 Skeleton summoned!'),'#4A6A30',16);
      sfxLevel();
    }
    for(const m of P.minions){
      /* minion sigue al jugador */
      const mdx=P.x-m.x,mdy=P.y-m.y,md=Math.sqrt(mdx*mdx+mdy*mdy);
      if(md>50){m.x+=mdx/md*180*dt;m.y+=mdy/md*180*dt}
      /* minion ataca */
      m.atkT-=dt;
      if(m.atkT<=0){
        let mc=null,mcd=Infinity;
        for(const e of enemigos){if(e.hp<=0)continue;const d=dist2(m,e);if(d<mcd){mcd=d;mc=e}}
        if(mc&&mcd<80*80){
          m.atkT=.7;
          golpear(mc,playerDMG()*.35,Math.random()<.1);
        }
      }
    }
  }
  /* fury decay */
  if(fury){furyT-=dt;if(furyT<=0){fury=false;texto(P.x,P.y-40,L('Furia termina','Fury ends'),'#8B8FA3',13)}}
  /* oleadas */
  waveT+=dt;
  if(waveT>=Math.min(24,10+piso*2)&&waveAnnounce===0){
    waveAnnounce=1;waveN++;
    const wn=L(WAVE_NAMES_ES,WAVE_NAMES_EN)[(waveN-1)%5];
    texto(P.x,P.y-80,L('OLEADA','WAVE')+' '+waveN+' — '+wn,'#D44A42',22);
    shake=10;sfxBoss();waveT=0;
    /* spawn burst */
    for(let wb=0;wb<6+waveN*2;wb++)spawnEnemigo();
    setTimeout(()=>{waveAnnounce=0},3000);
  }
  if(hintT>0){hintT-=dt;if(hintT<=0)$('hint').style.opacity=0}
  /* jugador */
  if(P.dashCD>0)P.dashCD-=dt;
  if(P.dashing>0){
    P.dashing-=dt;
    P.x+=P.dashVX*dt;P.y+=P.dashVY*dt;
    parts.push({x:P.x+R(-5,5),y:P.y+R(-5,5),vx:0,vy:0,life:.22,col:'#4DC0E8',r:R(2,4)});
    if(P.dashVX!==0)P.dir=P.dashVX>0?1:-1;
  } else {
    const iv=inputVec();
    P.x+=iv.x*playerSPD()*dt;P.y+=iv.y*playerSPD()*dt;
    if(iv.x!==0)P.dir=iv.x>0?1:-1;
  }
  if(P.inv>0)P.inv-=dt;
  if(P.regen>0&&P.hp<P.hpMax)P.hp=Math.min(P.hpMax,P.hp+P.regen*dt);
  if(P.swing>0)P.swing-=dt;

  /* ataque automático (según arma equipada) */
  P.atkT-=dt;
  if(P.atkT<=0&&enemigos.length){
    const A=armaEf();
    let cerca=null,cd=Infinity;
    for(const e of enemigos){if(!enPantalla(e))continue;const d=dist2(P,e);if(d<cd){cd=d;cerca=e}}
    const rg=rangef();
    if(cerca&&cd<rg*rg*1.2){
      P.atkT=atkCDf();
      const ang=Math.atan2(cerca.y-P.y,cerca.x-P.x);
      P.swing=.18;P.swingAng=ang;P.swingTipo=A.tipo;
      if(A.tipo==='bow'){
        balas.push({x:P.x,y:P.y,vx:Math.cos(ang)*520,vy:Math.sin(ang)*520,life:1.4,dmgM:1,arrow:true});
        AU.beep(280,180,.08,'triangle',.15);
      } else if(A.tipo==='orb'){
        balas.push({x:P.x,y:P.y,vx:Math.cos(ang)*380,vy:Math.sin(ang)*380,life:2,hom:true,dmgM:1});
        AU.beep(520,260,.1,'sine',.14);
      } else {
      const arco=A.arc*(1+ups.area*.12);
      for(const e of enemigos){
        if(!enPantalla(e))continue;
        const d=Math.sqrt(dist2(P,e));
        if(d<rg+e.r){
          let ok=arco>=6.28;
          if(!ok){
            let da=Math.atan2(e.y-P.y,e.x-P.x)-ang;
            da=Math.atan2(Math.sin(da),Math.cos(da));
            ok=Math.abs(da)<arco/2;
          }
          if(ok){
            const crit=Math.random()*100<playerCRIT();
            golpear(e,playerDMG()*R(.9,1.15)*(crit?2:1),crit);
            if(A.knock&&e.hp>0&&!e.jefe){
              const ka=Math.atan2(e.y-P.y,e.x-P.x);
              e.x+=Math.cos(ka)*A.knock;e.y+=Math.sin(ka)*A.knock;
            }
          }
        }
      }
      if(A.tipo==='slam'){
        rings.push({x:P.x,y:P.y,r:18,vr:480,life:.32});
        sfxSlam();shake=Math.max(shake,6);
      }
      }
      shake=Math.max(shake,1.5);
    }
  }
  /* orbitales */
  if(ups.orb>0){
    const orbMult=hasEvo('orbX3')?3:1;
    const orbSpd=(hasSyn('tormenta')?6.4:3.2)*(hasEvo('orbX3')?1.5:1);
    const n=ups.orb*orbMult,rad=58+ups.area*6,vel=tiempo*orbSpd;
    for(let i=0;i<n;i++){
      const a=vel+i*6.283/n,ox=P.x+Math.cos(a)*rad,oy=P.y+Math.sin(a)*rad;
      for(const e of enemigos){
        if(e.orbCD>tiempo)continue;
        const dx=e.x-ox,dy=e.y-oy;
        if(dx*dx+dy*dy<(e.r+13)*(e.r+13)){
          e.orbCD=tiempo+(hasSyn('tormenta')?.25:.45);
          const crit=Math.random()*100<playerCRIT();
          golpear(e,playerDMG()*.6*(crit?2:1),crit);
        }
      }
    }
  }
  /* proyectiles arcanos */
  if(ups.bolt>0){
    P.boltT=(P.boltT||0)-dt;
    if(P.boltT<=0&&enemigos.length){
      P.boltT=1.1/ups.bolt;
      let cerca=null,cd=Infinity;
      for(const e of enemigos){if(!enPantalla(e))continue;const d=dist2(P,e);if(d<cd){cd=d;cerca=e}}
      if(cerca&&cd<560*560){
        const a=Math.atan2(cerca.y-P.y,cerca.x-P.x);
        balas.push({x:P.x,y:P.y,vx:Math.cos(a)*430,vy:Math.sin(a)*430,life:1.6});
      }
    }
  }
  for(let i=balas.length-1;i>=0;i--){
    const b=balas[i];
    if(b.hom&&enemigos.length){
      let cer=null,cdd=Infinity;
      for(const e of enemigos){const d=dist2(b,e);if(d<cdd){cdd=d;cer=e}}
      if(cer){
        const ta=Math.atan2(cer.y-b.y,cer.x-b.x);
        const ca=Math.atan2(b.vy,b.vx);
        let da=Math.atan2(Math.sin(ta-ca),Math.cos(ta-ca));
        const na=ca+Math.sign(da)*Math.min(Math.abs(da),5.5*dt);
        const v=Math.hypot(b.vx,b.vy);
        b.vx=Math.cos(na)*v;b.vy=Math.sin(na)*v;
      }
    }
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    let hit=false;
    for(const e of enemigos){
      if(dist2(b,e)<(e.r+5)*(e.r+5)){
        const crit=Math.random()*100<playerCRIT();
        golpear(e,playerDMG()*(b.dmgM||.85)*(crit?2:1),crit);
        chispa(b.x,b.y,'#8B7CF0',5);
        if((hasSyn('teletormenta')||hasEvo('boltPierce'))&&!b.pierced){
          b.pierced=true;
          let next=null,nd=Infinity;
          for(const e2 of enemigos){if(e2===e||e2.hp<=0)continue;const dd=dist2(b,e2);if(dd<nd){nd=dd;next=e2}}
          if(next&&nd<300*300){const na=Math.atan2(next.y-b.y,next.x-b.x);b.vx=Math.cos(na)*430;b.vy=Math.sin(na)*430;b.life=Math.max(b.life,.6)}
          else hit=true;
        } else hit=true;
        break;
      }
    }
    if(hit||b.life<=0)balas.splice(i,1);
  }
  /* enemigos */
  if(piso%5!==0||!boss){
    spawnT-=dt;
    const intv=Math.max(.14,(piso%5===0?.65:.60)-piso*.022)*(mod&&mod.spawn?mod.spawn:1)*(P.cursed>0?.5:1);
    if(spawnT<=0){spawnT=intv;spawnEnemigo()}
  }
  for(let i=enemigos.length-1;i>=0;i--){
    const e=enemigos[i];
    if(e.hp<=0){enemigos.splice(i,1);continue}
    if(e.flash>0)e.flash-=dt;
    if(e.hitCD>0)e.hitCD-=dt;
    e.wob+=dt*7;
    if(e.jefe){
      e.chargeT-=dt;
      if(e.charging>0){
        e.charging-=dt;e.x+=e.cvx*dt;e.y+=e.cvy*dt;
      } else {
        if(e.chargeT<=0){
          e.chargeT=R(3.5,5.5);e.charging=.8;
          const a=Math.atan2(P.y-e.y,P.x-e.x);
          e.cvx=Math.cos(a)*330;e.cvy=Math.sin(a)*330;
          texto(e.x,e.y-e.r-16,L('¡EMBISTE!','CHARGES!'),'#D44A42',15);
        } else {
          const a=Math.atan2(P.y-e.y,P.x-e.x);
          e.x+=Math.cos(a)*e.spd*dt;e.y+=Math.sin(a)*e.spd*dt;
        }
      }
    } else {
      const a=Math.atan2(P.y-e.y,P.x-e.x);
      e.x+=Math.cos(a)*e.spd*dt;e.y+=Math.sin(a)*e.spd*dt;
    }
    /* separación simple */
    for(let j=i+1;j<enemigos.length;j++){
      const o=enemigos[j],dx=o.x-e.x,dy=o.y-e.y,d2=dx*dx+dy*dy,md=e.r+o.r;
      if(d2>0&&d2<md*md){const d=Math.sqrt(d2),p=(md-d)/d*.4;
        e.x-=dx*p;e.y-=dy*p;o.x+=dx*p;o.y+=dy*p}
    }
    /* contacto con jugador */
    const pr=P.r+e.r;
    if(dist2(P,e)<pr*pr&&e.hitCD<=0&&P.inv<=0){
      e.hitCD=.65;
      let rawDmg=e.dmg;
      if(shield>0){const ab=Math.min(shield,rawDmg);shield-=ab;rawDmg-=ab;texto(P.x,P.y-40,'-'+F(ab)+' escudo','#8B7CF0',13)}
      P.hp-=rawDmg;P.inv=.25;shake=Math.max(shake,5);
      sfxHurt();
      texto(P.x,P.y-26,'-'+F(rawDmg),'#D44A42',17);
      chispa(P.x,P.y,'#D44A42',7);
      if(P.hp<=0){morir();return}
    }
  }
  /* ondas expansivas */
  for(let i=rings.length-1;i>=0;i--){
    const rn=rings[i];rn.r+=rn.vr*dt;rn.life-=dt;
    if(rn.life<=0)rings.splice(i,1);
  }
  /* gemas y monedas */
  const mg=magnetf();
  /* merge nearby gems into mega gems */
  if(gemas.length>20&&Math.random()<.1){
    for(let mi=gemas.length-1;mi>0;mi--){
      if(gemas[mi].fly)continue;
      for(let mj=mi-1;mj>=0;mj--){
        if(gemas[mj].fly)continue;
        if(dist2(gemas[mi],gemas[mj])<30*30){
          gemas[mj].v+=gemas[mi].v;
          gemas[mj].r=Math.min(12,gemas[mj].r+1);
          gemas.splice(mi,1);break;
        }
      }
    }
  }
  for(let i=gemas.length-1;i>=0;i--){
    const g=gemas[i],d=Math.sqrt(dist2(P,g));
    if(d<mg)g.fly=true;
    if(g.fly){const a=Math.atan2(P.y-g.y,P.x-g.x),v=480;
      g.x+=Math.cos(a)*v*dt;g.y+=Math.sin(a)*v*dt}
    if(d<P.r+g.r+4){
      const xpMult=P.cursed>0?1.8:1;
      xp+=Math.round(g.v*xpMult*(hasRel('ojo')?1.3:1));gemas.splice(i,1);
      sfxGem(1+Math.min(combo,30)*.03);
      if(hasSyn('imán'))P.hp=Math.min(P.hpMax,P.hp+5);
      /* chain explosion: gemas cercanas se activan */
      for(const g2 of gemas){
        if(!g2.fly&&dist2(g,g2)<55*55){g2.fly=true;g2.chain=true}
      }
      /* soul harvest: muchas gemas juntas */
      if(gemas.filter(gx=>gx.fly).length>12){
        texto(P.x,P.y-65,L('✦ COSECHA DE ALMAS','✦ SOUL HARVEST'),'#8B7CF0',20);
        P.superFlash=.15;shake=Math.max(shake,6);
        AU.beep(330,1320,.3,'triangle',.2);
      }
      if(xp>=xpNeed){subirNivel();return}
    }
  }
  for(let i=monedas.length-1;i>=0;i--){
    const m=monedas[i],d=Math.sqrt(dist2(P,m));
    if(d<mg)m.fly=true;
    if(m.fly){const a=Math.atan2(P.y-m.y,P.x-m.x);
      m.x+=Math.cos(a)*480*dt;m.y+=Math.sin(a)*480*dt}
    if(d<P.r+10){
      if(m.pot){const c=P.hpMax*.3;P.hp=Math.min(P.hpMax,P.hp+c);
        sfxPot();texto(P.x,P.y-30,'+'+F(c)+' HP','#3DC97E',16)}
      else{const bono=1+Math.min(combo,40)*.02;
        const gan=Math.round(m.v*bono*(hasRel('gema')?1.8:1));
        oroRun+=gan;gstats.oroTotal+=gan;sfxCoin();
        texto(m.x,m.y-12,'+'+F(m.v*bono),'#E8B33C',13)}
      monedas.splice(i,1);
    }
  }
  /* trail (segador synergy) */
  if(hasSyn('segador')&&(P.dashing>0||Math.abs(inputVec().x)+Math.abs(inputVec().y)>.2)){
    trail.push({x:P.x,y:P.y,life:.6});
    for(const e of enemigos){
      if(e.trailCD>tiempo)continue;
      if(dist2({x:P.x,y:P.y},e)<(e.r+18)*(e.r+18)){
        e.trailCD=tiempo+.3;
        golpear(e,playerDMG()*.25,false);
      }
    }
  }
  for(let i=trail.length-1;i>=0;i--){trail[i].life-=dt;if(trail[i].life<=0)trail.splice(i,1)}
  /* cofres */
  for(let i=cofres.length-1;i>=0;i--){
    const c=cofres[i];c.t+=dt;
    if(c.abierto){cofres.splice(i,1);continue}
    if(dist2(P,c)<(c.r+P.r)*(c.r+P.r)){abrirCofre(c)}
  }
  /* temp buff & curse decay */
  if(P.tempBuff){P.tempBuff.dur-=dt;if(P.tempBuff.dur<=0){P.tempBuff=null;texto(P.x,P.y-40,L('Buff terminado','Buff expired'),'#8B8FA3',13)}}
  if(P.cursed>0){P.cursed-=dt;if(P.cursed<=0)texto(P.x,P.y-40,L('Maldición termina','Curse expired'),'#8B8FA3',13)}
  if(shield>0)shield=Math.max(0,shield-dt*2);
  if(P.superFlash>0)P.superFlash-=dt;
  if(floorFlash>0)floorFlash=Math.max(0,floorFlash-dt*1);if(floorRipple>0)floorRipple=Math.max(0,floorRipple-dt*1.3);
  /* portal */
  if(portal){
    portal.t+=dt;
    if(dist2(P,portal)<(portal.r+P.r)*(portal.r+P.r)){siguientePiso();return}
  }
  /* combo */
  if(comboT>0){comboT-=dt;if(comboT<=0)combo=0}
  /* partículas y textos */
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.92;p.vy*=.92;p.life-=dt;
    if(p.life<=0)parts.splice(i,1)}
  for(let i=textos.length-1;i>=0;i--){const t=textos[i];
    t.y+=t.vy*dt;t.life-=dt;if(t.life<=0)textos.splice(i,1)}
  if(shake>0)shake=Math.max(0,shake-dt*30);
  renderHUD();
}

/* ================= dibujo ================= */
function draw(){
  ctx.imageSmoothingEnabled=false;
  const B=bioma();
  ctx.fillStyle=B.bg;ctx.fillRect(0,0,W,H);
  const camx=P.x-W/2+(shake?R(-shake,shake):0);
  const camy=P.y-H/2+(shake?R(-shake,shake):0);
  _camx=camx;_camy=camy;_W=W;_H=H;
  ctx.save();ctx.translate(-camx,-camy);

  /* ===== PISO CON TILES DE BIOMA ===== */
  const bi=Math.min(4,Math.floor((piso-1)/5));
  if(TILES[bi]){
    /* tile pattern */
    if(!TILE_PAT[bi])TILE_PAT[bi]=ctx.createPattern(TILES[bi],'repeat');
    ctx.fillStyle=TILE_PAT[bi];
    ctx.save();
    ctx.fillRect(camx-128,camy-128,W+256,H+256);
    ctx.restore();
  } else {
    /* fallback: grilla procedural */
    const gs=80;
    const x0=Math.floor(camx/gs)*gs-gs,y0=Math.floor(camy/gs)*gs-gs;
    ctx.strokeStyle=B.line;ctx.lineWidth=1;ctx.globalAlpha=.35;
    ctx.beginPath();
    for(let x=x0;x<camx+W+gs*2;x+=gs){ctx.moveTo(x,camy-gs);ctx.lineTo(x,camy+H+gs)}
    for(let y=y0;y<camy+H+gs*2;y+=gs){ctx.moveTo(camx-gs,y);ctx.lineTo(camx+W+gs,y)}
    ctx.stroke();ctx.globalAlpha=1;
  }

  /* ===== DECORACIONES PROCEDURALES (densidad progresiva) ===== */
  const pEB=pisoEnBioma();
  const densityMult=1+pEB*.15;
  const dgs=Math.round(190/densityMult);
  const dx0=Math.floor(camx/dgs)*dgs-dgs,dy0=Math.floor(camy/dgs)*dgs-dgs;
  for(let gx=dx0;gx<camx+W+dgs*2;gx+=dgs)for(let gy=dy0;gy<camy+H+dgs*2;gy+=dgs){
    const cx=Math.floor(gx/dgs),cy=Math.floor(gy/dgs);
    const h=hash(cx*7+3,cy*13+7);
    const px=gx+h*120,py=gy+hash2(cx,cy)*120;

    if(h<.10){
      /* CALAVERA */
      ctx.globalAlpha=(.18+h*.3)*(1+pEB*.12);
      ctx.fillStyle='#C8C0B0';
      ctx.beginPath();ctx.arc(px,py,6+h*4,0,6.283);ctx.fill();
      ctx.fillStyle=B.bg;
      ctx.beginPath();ctx.arc(px-2.5,py-1,1.5,0,6.283);ctx.fill();
      ctx.beginPath();ctx.arc(px+2.5,py-1,1.5,0,6.283);ctx.fill();
      ctx.fillRect(px-2,py+2.5,1,2);ctx.fillRect(px+1,py+2.5,1,2);
      ctx.globalAlpha=1;
    } else if(h<.18){
      /* HUESOS cruzados */
      ctx.globalAlpha=.14*(1+pEB*.15);
      ctx.strokeStyle='#A8A090';ctx.lineWidth=2.5;ctx.lineCap='round';
      const a=h*3;
      ctx.save();ctx.translate(px,py);ctx.rotate(a);
      ctx.beginPath();ctx.moveTo(-10,-8);ctx.lineTo(10,8);ctx.moveTo(-10,8);ctx.lineTo(10,-8);ctx.stroke();
      /* cabezas de hueso */
      ctx.fillStyle='#A8A090';
      [[-10,-8],[10,8],[-10,8],[10,-8]].forEach(([bx,by])=>{ctx.beginPath();ctx.arc(bx,by,2.5,0,6.283);ctx.fill()});
      ctx.restore();ctx.lineCap='butt';ctx.globalAlpha=1;
    } else if(h<.24&&bi>=1){
      /* LÁPIDA */
      ctx.globalAlpha=.2*(1+pEB*.12);
      ctx.fillStyle='#4A4E5A';
      ctx.beginPath();
      ctx.moveTo(px-8,py+10);ctx.lineTo(px-8,py-6);
      ctx.quadraticCurveTo(px,py-16,px+8,py-6);
      ctx.lineTo(px+8,py+10);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#2A2E38';ctx.lineWidth=1.5;ctx.stroke();
      /* cruz */
      ctx.strokeStyle='#6A6E78';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(px,py-10);ctx.lineTo(px,py+2);
      ctx.moveTo(px-4,py-5);ctx.lineTo(px+4,py-5);ctx.stroke();
      ctx.globalAlpha=1;
    } else if(h<.30&&bi>=2){
      /* CHARCO DE SANGRE */
      ctx.globalAlpha=.12*(1+pEB*.2);
      ctx.fillStyle='#4A1010';
      ctx.beginPath();ctx.ellipse(px,py,14+h*10,8+h*6,h*2,0,6.283);ctx.fill();
      ctx.fillStyle='#5A1818';
      ctx.beginPath();ctx.ellipse(px+3,py-2,6+h*4,4+h*3,h*4,0,6.283);ctx.fill();
      ctx.globalAlpha=1;
    } else if(h<.34&&bi>=3){
      /* VELA encendida */
      ctx.globalAlpha=.3*(1+pEB*.1);
      ctx.fillStyle='#A0946E';ctx.fillRect(px-2,py,4,10);
      /* llama */
      const flk=Math.sin(tiempo*8+h*20)*2;
      ctx.fillStyle='#E8A23C';
      ctx.beginPath();ctx.moveTo(px-3,py);ctx.quadraticCurveTo(px+flk,py-10,px+3,py);ctx.fill();
      ctx.fillStyle='#FFE080';
      ctx.beginPath();ctx.moveTo(px-1.5,py);ctx.quadraticCurveTo(px+flk*.5,py-6,px+1.5,py);ctx.fill();
      /* resplandor */
      ctx.fillStyle='#E8A23C08';ctx.beginPath();ctx.arc(px,py-4,25+Math.sin(tiempo*6)*5,0,6.283);ctx.fill();
      ctx.globalAlpha=1;
    } else if(h<.38){
      /* PIEDRA irregular */
      ctx.globalAlpha=.15;ctx.fillStyle=B.accent;
      ctx.beginPath();ctx.ellipse(px,py,8+h*14,5+h*8,h*5,0,6.283);ctx.fill();
      ctx.globalAlpha=1;
    } else if(h<.41&&bi>=1){
      /* CADENAS rotas */
      ctx.globalAlpha=.13*(1+pEB*.15);ctx.strokeStyle='#6A6A7A';ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        ctx.arc(px-10+i*5,py+(i%2)*3,2.5,0,6.283);
      }
      ctx.stroke();
      ctx.strokeStyle='#8A3020';ctx.beginPath();
      ctx.arc(px+18,py+4,3,0,4);ctx.stroke();
      ctx.globalAlpha=1;
    } else if(h<.46&&bi>=2){
      /* CÍRCULO RITUAL */
      ctx.globalAlpha=.08*(1+pEB*.2);
      ctx.strokeStyle=bi>=3?'#6A2020':'#3A3A5A';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(px,py,18+h*10,0,6.283);ctx.stroke();
      /* runas */
      for(let ri=0;ri<5;ri++){
        const ra=ri*1.257+h*4,rr=18+h*10;
        ctx.fillStyle=bi>=3?'#8A3020':'#4A4A6A';
        ctx.fillRect(px+Math.cos(ra)*rr-2,py+Math.sin(ra)*rr-2,4,4);
      }
      /* pentagrama interior */
      ctx.beginPath();
      for(let ri=0;ri<5;ri++){
        const ra=ri*1.257+h*4-.6,rr=(18+h*10)*.6;
        const rx=px+Math.cos(ra)*rr,ry=py+Math.sin(ra)*rr;
        ri===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
      }
      ctx.closePath();ctx.stroke();
      ctx.globalAlpha=1;
    } else if(h<.49){
      /* ESPADA/ESCUDO ROTO clavado en el piso */
      ctx.globalAlpha=.16*(1+pEB*.1);
      ctx.strokeStyle='#8A93A5';ctx.lineWidth=2.5;ctx.lineCap='round';
      const sa2=h*5;
      ctx.save();ctx.translate(px,py);ctx.rotate(sa2);
      /* hoja */
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(-3,-14);ctx.lineTo(3,-14);ctx.closePath();
      ctx.fillStyle='#8A93A5';ctx.fill();
      /* guarda */
      ctx.strokeStyle='#6B4F1D';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(-6,4);ctx.lineTo(6,4);ctx.stroke();
      ctx.restore();ctx.lineCap='butt';ctx.globalAlpha=1;
    } else if(h<.52&&bi>=1){
      /* TELARAÑA */
      ctx.globalAlpha=.06*(1+pEB*.15);ctx.strokeStyle='#9A9AAA';ctx.lineWidth=.8;
      ctx.beginPath();
      for(let ti=0;ti<6;ti++){
        const ta=ti*1.047;ctx.moveTo(px,py);
        ctx.lineTo(px+Math.cos(ta)*22,py+Math.sin(ta)*22);
      }
      ctx.stroke();
      for(let tr=1;tr<=3;tr++){
        ctx.beginPath();
        for(let ti=0;ti<=6;ti++){
          const ta=ti*1.047,trr=tr*7;
          const tx=px+Math.cos(ta)*trr,ty=py+Math.sin(ta)*trr;
          ti===0?ctx.moveTo(tx,ty):ctx.lineTo(tx,ty);
        }
        ctx.stroke();
      }
      ctx.globalAlpha=1;
    } else if(h<.55&&bi>=2){
      /* PILA DE CALAVERAS (montículo) */
      ctx.globalAlpha=.14*(1+pEB*.12);
      for(let si=0;si<3+Math.floor(h*5);si++){
        const sox=px-8+si*5+Math.sin(si*2)*3,soy=py+4-si*3;
        ctx.fillStyle='#B8B0A0';
        ctx.beginPath();ctx.arc(sox,soy,4,0,6.283);ctx.fill();
        ctx.fillStyle=B.bg;
        ctx.beginPath();ctx.arc(sox-1.2,soy-.8,.8,0,6.283);ctx.fill();
        ctx.beginPath();ctx.arc(sox+1.2,soy-.8,.8,0,6.283);ctx.fill();
      }
      ctx.globalAlpha=1;
    }

    /* ===== PELIGROS AMBIENTALES (cada 2 frames) ===== */
    const drawHazards=Math.floor(tiempo*30)%2===0;if(!drawHazards){}else{
    if(h>.90&&bi>=3){
      /* GRIETA con vapor rojo (Santuario+) */
      ctx.globalAlpha=.2;ctx.strokeStyle='#3A1010';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(px-12,py);
      ctx.lineTo(px-4,py+5);ctx.lineTo(px+2,py-3);ctx.lineTo(px+10,py+2);ctx.stroke();
      /* vapor */
      const vt=tiempo*2+h*10;
      for(let vi=0;vi<3;vi++){
        const vx=px-6+vi*6+Math.sin(vt+vi*2)*3;
        const vy=py-5-Math.abs(Math.sin(vt*.8+vi*1.5))*18;
        ctx.fillStyle='rgba(180,40,30,'+(0.06+Math.sin(vt+vi)*.03)+')';
        ctx.beginPath();ctx.arc(vx,vy,4+Math.sin(vt+vi)*2,0,6.283);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    if(h>.92&&bi>=4){
      /* OJOS que brillan en la oscuridad (Abismo) */
      const et=tiempo*1.5+h*20;
      const blink=Math.sin(et)>.1;
      if(blink){
        /* flechas del arco */
  ctx.fillStyle='#A07B2E';
  for(const b of balas){
    if(!b.arrow)continue;
    ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.atan2(b.vy,b.vx));
    ctx.fillRect(-10,-1.5,16,3);
    ctx.fillStyle='#C8CDD8';ctx.beginPath();ctx.moveTo(6,-3);ctx.lineTo(10,0);ctx.lineTo(6,3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#A07B2E';
    ctx.restore();
  }
  ctx.fillStyle='#8B7CF0';ctx.globalAlpha=.15+Math.sin(et*3)*.08;
        ctx.beginPath();ctx.arc(px-4,py,2.5,0,6.283);ctx.fill();
        ctx.beginPath();ctx.arc(px+4,py,2.5,0,6.283);ctx.fill();
        /* resplandor */
        ctx.fillStyle='#8B7CF008';
        ctx.beginPath();ctx.arc(px,py,16,0,6.283);ctx.fill();
        ctx.globalAlpha=1;
      }
    }
    if(h>.88&&h<.90&&bi>=1){
      /* CADENAS colgantes (Catacumbas+) */
      ctx.globalAlpha=.1*(1+pEB*.1);ctx.strokeStyle='#5A5A6A';ctx.lineWidth=2;
      const swing=Math.sin(tiempo*1.2+h*8)*4;
      ctx.beginPath();ctx.moveTo(px,py-20);
      ctx.quadraticCurveTo(px+swing,py-8,px+swing*.6,py+10);ctx.stroke();
      /* peso */
      ctx.fillStyle='#4A4A5A';
      ctx.beginPath();ctx.arc(px+swing*.6,py+12,4,0,6.283);ctx.fill();
      ctx.globalAlpha=1;
    }
    if(h>.85&&h<.88&&bi>=3){
      /* SANGRE goteando */
      const drip=((tiempo*0.8+h*10)%2);
      ctx.fillStyle='#6A1818';ctx.globalAlpha=.18;
      ctx.beginPath();ctx.arc(px,py-12+drip*14,2,0,6.283);ctx.fill();
      if(drip>1.5){
        ctx.beginPath();ctx.ellipse(px,py+6,5,2,0,0,6.283);ctx.fill();
      }
      ctx.globalAlpha=1;
    }
    }/* end hazards */
  }

  /* ===== SANGRE PERSISTENTE (kills) ===== */
  ctx.fillStyle=bi>=3?'#5A1414':'#3A1010';
  for(const sp of sangre){
    ctx.globalAlpha=sp.op;
    ctx.beginPath();ctx.arc(sp.x,sp.y,sp.r*.75,0,6.283);ctx.fill();
  }
  ctx.globalAlpha=1;

  /* ===== PARTÍCULAS AMBIENTALES ===== */
  const ambMax=20+pisoEnBioma()*4;
  if(ambient.length<ambMax){
    const ax=camx+R(0,W),ay=camy+R(0,H);
    ambient.push({x:ax,y:ay,vx:R(-.3,.3),vy:R(-12,-30),life:R(3,7),
      r:R(.8,2.2),col:bi>=3?'#D44A42':bi>=2?'#8A8060':'#6A7A9A'});
    /* clima del bioma */
    if(bi===3&&Math.random()<.3){
      /* ceniza cayendo en Santuario */
      ambient.push({x:camx+R(0,W),y:camy-10,vx:R(-8,8),vy:R(20,45),life:R(4,8),r:R(1,2.5),col:'#8A3020'});
    }
    if(bi===4&&Math.random()<.4){
      /* chispas púrpuras en Abismo */
      ambient.push({x:camx+R(0,W),y:camy+R(0,H),vx:R(-15,15),vy:R(-25,-5),life:R(2,5),r:R(1,3),col:'#8B7CF0'});
    }
    if(bi===2&&Math.random()<.2){
      /* neblina verde en Campo de Huesos */
      ambient.push({x:camx+R(0,W),y:camy+H-R(0,80),vx:R(-5,5),vy:R(-3,3),life:R(4,9),r:R(3,7),col:'#4A6A30'});
    }
  }
  for(let i=ambient.length-1;i>=0;i--){
    const a=ambient[i];
    a.x+=a.vx+Math.sin(tiempo*2+i)*.3;a.y+=a.vy*.016;
    a.life-=.016;
    if(a.life<=0||a.x<camx-40||a.x>camx+W+40||a.y<camy-40){
      ambient.splice(i,1);continue;
    }
    ctx.globalAlpha=Math.min(.35,a.life*.15);
    ctx.fillStyle=a.col;ctx.beginPath();ctx.arc(a.x,a.y,a.r,0,6.283);ctx.fill();
  }
  ctx.globalAlpha=1;
  /* portal procedural — limpio y estático (vórtice de luz) */
  if(portal){
    const pu=portal.t*4, pr=portal.r;
    ctx.save();ctx.translate(portal.x,portal.y);
    /* resplandor exterior */
    ctx.fillStyle='#4DC0E814';ctx.beginPath();ctx.arc(0,0,pr+22,0,6.283);ctx.fill();
    /* núcleo con gradiente radial */
    const grd=ctx.createRadialGradient(0,0,2,0,0,pr);
    grd.addColorStop(0,'#EAFBFF');grd.addColorStop(.25,'#7FE0FF');grd.addColorStop(.6,'#2E8AB0');grd.addColorStop(1,'#123A55');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,pr,0,6.283);ctx.fill();
    /* anillos concéntricos (estáticos) */
    for(let i=1;i<=3;i++){
      ctx.strokeStyle=i===3?'#CFF4FF':'#4DC0E8';ctx.lineWidth=i===3?3:2;ctx.globalAlpha=.5+i*.15;
      ctx.beginPath();ctx.arc(0,0,pr*(i/3.4),0,6.283);ctx.stroke();
    }
    ctx.globalAlpha=1;
    /* borde */
    ctx.strokeStyle='#9BE8FF';ctx.lineWidth=2.5;ctx.beginPath();ctx.arc(0,0,pr,0,6.283);ctx.stroke();
    /* etiqueta */
    ctx.fillStyle='#4DC0E8';ctx.font='700 13px "IBM Plex Sans"';ctx.textAlign='center';
    ctx.globalAlpha=.55+Math.sin(pu)*.25;
    ctx.fillText(L('▼ PORTAL ▼','▼ PORTAL ▼'),0,-pr-22);
    ctx.globalAlpha=1;
    ctx.restore();
  }
  /* gemas y monedas */
  for(const g of gemas){
    const s=g.r*1.15;
    /* glow */
    ctx.fillStyle='rgba(77,192,232,.18)';
    ctx.beginPath();ctx.arc(g.x,g.y,s+3,0,6.283);ctx.fill();
    ctx.save();ctx.translate(g.x,g.y);
    /* cuerpo diamante */
    ctx.fillStyle='#2E8AB0';
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.78,0);ctx.lineTo(0,s);ctx.lineTo(-s*.78,0);ctx.closePath();ctx.fill();
    /* faceta superior clara */
    ctx.fillStyle='#5FD0EE';
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.78,0);ctx.lineTo(0,0);ctx.lineTo(-s*.78,0);ctx.closePath();ctx.fill();
    /* brillo */
    ctx.fillStyle='#CFF4FF';
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(s*.28,-s*.4);ctx.lineTo(0,0);ctx.lineTo(-s*.28,-s*.4);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  for(const m of monedas){
    if(m.pot){
      const ps=OSPR.potion;
      if(ps&&ps.img){const pf=Math.floor(tiempo*5)%ps.n;
        ctx.drawImage(ps.img,pf*ps.w,0,ps.w,ps.h,m.x-ps.w*.5,m.y-ps.h*.5,ps.w*1,ps.h*1);
      } else {ctx.fillStyle='#3DC97E';ctx.beginPath();ctx.arc(m.x,m.y,7,0,6.283);ctx.fill();
        ctx.fillStyle='#0B0C11';ctx.fillRect(m.x-4,m.y-1.5,8,3);ctx.fillRect(m.x-1.5,m.y-4,3,8)}
    } else {
      const cs=OSPR.coin;
      if(cs&&cs.img){const cf=Math.floor(tiempo*5)%cs.n;
        ctx.drawImage(cs.img,cf*cs.w,0,cs.w,cs.h,m.x-cs.w*.45,m.y-cs.h*.45,cs.w*.9,cs.h*.9);
      } else {ctx.fillStyle='#E8B33C';ctx.beginPath();ctx.arc(m.x,m.y,6,0,6.283);ctx.fill();
        ctx.strokeStyle='#A07B2E';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(m.x,m.y,3.5,0,6.283);ctx.stroke()}
    }
  }
  /* enemigos */
  for(const e of enemigos)drawEnemigo(e);
  /* orbitales */
  if(ups.orb>0){
    const n=ups.orb,rad=58+ups.area*6,vel=tiempo*3.2;
    for(let i=0;i<n;i++){
      const a=vel+i*6.283/n,ox=P.x+Math.cos(a)*rad,oy=P.y+Math.sin(a)*rad;
      ctx.save();ctx.translate(ox,oy);ctx.rotate(a+1.57);
      ctx.fillStyle='#C8CDD8';
      ctx.beginPath();ctx.moveTo(0,-13);ctx.lineTo(5,8);ctx.lineTo(-5,8);ctx.closePath();ctx.fill();
      ctx.fillStyle='#6B4F1D';ctx.fillRect(-2.5,8,5,6);
      ctx.restore();
    }
  }
  /* balas */
  ctx.fillStyle='#8B7CF0';
  for(const b of balas){ctx.beginPath();ctx.arc(b.x,b.y,5,0,6.283);ctx.fill();
    ctx.fillStyle='#8B7CF055';ctx.beginPath();ctx.arc(b.x-b.vx*.012,b.y-b.vy*.012,4,0,6.283);ctx.fill();
    ctx.fillStyle='#8B7CF0'}
  /* trail */
  for(const tr of trail){
    ctx.globalAlpha=Math.max(0,tr.life*1.5);
    ctx.fillStyle='#D44A42';ctx.beginPath();ctx.arc(tr.x,tr.y,14,0,6.283);ctx.fill();
    ctx.fillStyle='#FFD23C44';ctx.beginPath();ctx.arc(tr.x,tr.y,8,0,6.283);ctx.fill();
  }
  ctx.globalAlpha=1;
  /* cofres — 1 solo, limpio y estático (procedural) */
  for(const c of cofres){
    if(c.abierto)continue;
    /* resplandor suave ESTÁTICO (sin pulso) */
    ctx.fillStyle='rgba(232,179,60,.10)';
    ctx.beginPath();ctx.arc(c.x,c.y,c.r+10,0,6.283);ctx.fill();
    ctx.save();ctx.translate(c.x,c.y+2);
    /* sombra */
    ctx.fillStyle='#00000044';ctx.beginPath();ctx.ellipse(0,12,16,4,0,0,6.283);ctx.fill();
    /* cuerpo */
    ctx.fillStyle='#5A3D18';ctx.fillRect(-15,-2,30,14);
    ctx.fillStyle='#6E4C1F';ctx.fillRect(-15,-2,30,5);
    /* tapa abovedada */
    ctx.fillStyle='#7A5524';ctx.beginPath();ctx.moveTo(-15,-2);ctx.quadraticCurveTo(0,-16,15,-2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8C6329';ctx.beginPath();ctx.moveTo(-15,-4);ctx.quadraticCurveTo(0,-15,15,-4);ctx.lineTo(15,-6);ctx.quadraticCurveTo(0,-17,-15,-6);ctx.closePath();ctx.fill();
    /* herrajes dorados verticales */
    ctx.fillStyle='#C9A03A';ctx.fillRect(-11,-9,3,21);ctx.fillRect(8,-9,3,21);
    /* banda + cerradura central */
    ctx.fillStyle='#E8B33C';ctx.fillRect(-2.5,-11,5,23);
    ctx.fillStyle='#FCE08A';ctx.beginPath();ctx.arc(0,3,3.2,0,6.283);ctx.fill();
    ctx.fillStyle='#5A3D18';ctx.fillRect(-1,3,2,4);
    /* línea borde tapa */
    ctx.strokeStyle='#C9A03A';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-15,-2);ctx.lineTo(15,-2);ctx.stroke();
    ctx.restore();
  }
  /* ondas expansivas */
  for(const rn of rings){
    ctx.globalAlpha=Math.max(0,rn.life*3);
    ctx.strokeStyle='#E8B33C';ctx.lineWidth=5;
    ctx.beginPath();ctx.arc(rn.x,rn.y,rn.r,0,6.283);ctx.stroke();
    ctx.globalAlpha=1;
  }
  /* jugador */
  drawJugador();
  /* minions del nigromante */
  if(esNecro()&&P.minions){
    for(const m of P.minions){
      ctx.fillStyle='#00000044';ctx.beginPath();ctx.ellipse(m.x,m.y+10,8,3,0,0,6.283);ctx.fill();
      ctx.fillStyle='#B8B0A0';ctx.beginPath();ctx.arc(m.x,m.y,7,0,6.283);ctx.fill();
      ctx.fillStyle='#14161D';
      ctx.beginPath();ctx.arc(m.x-2,m.y-1,1.5,0,6.283);ctx.fill();
      ctx.beginPath();ctx.arc(m.x+2,m.y-1,1.5,0,6.283);ctx.fill();
      ctx.strokeStyle='#B8B0A0';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(m.x,m.y+7);ctx.lineTo(m.x,m.y+14);ctx.stroke();
      ctx.beginPath();ctx.moveTo(m.x-5,m.y+10);ctx.lineTo(m.x+5,m.y+10);ctx.stroke();
    }
  }
  /* escudo blood pact */
  if(shield>0){
    ctx.strokeStyle='#8B7CF0';ctx.lineWidth=3;ctx.globalAlpha=Math.min(1,shield/10);
    ctx.beginPath();ctx.arc(P.x,P.y,P.r+8+Math.sin(tiempo*6)*2,0,6.283);ctx.stroke();
    ctx.globalAlpha=1;
  }
  /* fury tint */
  if(fury){
    ctx.fillStyle='rgba(180,30,20,'+(0.06+Math.sin(tiempo*8)*0.03)+')';
    ctx.fillRect(camx,camy,W,H);
  }
  /* super flash */
  if(P.superFlash>0){
    ctx.fillStyle='rgba(255,210,60,'+P.superFlash*.4+')';
    ctx.fillRect(camx,camy,W,H);
  }
  /* partículas */
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life*2.2);
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.283);ctx.fill()}
  ctx.globalAlpha=1;
  /* textos flotantes */
  ctx.textAlign='center';
  for(const t of textos){ctx.globalAlpha=Math.max(0,t.life*1.4);
    ctx.font='700 '+t.sz+'px "IBM Plex Sans"';
    ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText(t.t,t.x,t.y);
    ctx.fillStyle=t.col;ctx.fillText(t.t,t.x,t.y)}
  ctx.globalAlpha=1;
  ctx.restore();

  /* ===== FLECHA INDICADORA DEL PORTAL (screen-space) ===== */
  if(portal){
    const pdx=portal.x-P.x,pdy=portal.y-P.y;
    const pd=Math.sqrt(pdx*pdx+pdy*pdy);
    if(pd>Math.min(W,H)*.35){
      const pa=Math.atan2(pdy,pdx);
      const edgeR=Math.min(W,H)*.4;
      const ax=W/2+Math.cos(pa)*edgeR;
      const ay=H/2+Math.sin(pa)*edgeR;
      const pulse=1+Math.sin(tiempo*6)*.18;
      ctx.save();ctx.translate(ax,ay);ctx.rotate(pa);ctx.scale(pulse,pulse);
      ctx.fillStyle='#4DC0E8';ctx.beginPath();
      ctx.moveTo(20,0);ctx.lineTo(-8,-11);ctx.lineTo(-3,0);ctx.lineTo(-8,11);ctx.closePath();ctx.fill();
      ctx.strokeStyle='#2E8AB0';ctx.lineWidth=2;ctx.stroke();
      ctx.font='700 11px "IBM Plex Sans"';ctx.textAlign='center';
      ctx.fillStyle='#4DC0E8cc';ctx.fillText(Math.round(pd)+'m',0,22);
      ctx.restore();
    }
  }

  /* ===== FOG + VIGNETTE (screen-space) ===== */
  const B2=bioma();
  /* niebla baja */
  const fogGrad=ctx.createLinearGradient(0,H*.55,0,H);
  fogGrad.addColorStop(0,'transparent');
  fogGrad.addColorStop(1,B2.fog);
  ctx.fillStyle=fogGrad;ctx.fillRect(0,0,W,H);
  /* viñeta (se cierra más con cada piso) */
  const vigShrink=1-pisoEnBioma()*.04;
  const vig=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.25*vigShrink,W/2,H/2,Math.max(W,H)*(.75-pisoEnBioma()*.03));
  vig.addColorStop(0,'transparent');
  const darkHex=['cc','d4','dc','e4','ee'];
  vig.addColorStop(1,B2.bg+(darkHex[pisoEnBioma()]||'cc'));
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  /* flash de transición de piso (multi-fase) */
  if(floorFlash>0){
    /* fase 1: flash blanco */
    if(floorFlash>.25){
      ctx.fillStyle='rgba(255,255,255,'+((floorFlash-.25)*.5*4)+')';
      ctx.fillRect(0,0,W,H);
    }
    /* fase 2: tinte del bioma */
    const r2=parseInt(floorFlashCol.slice(1,3),16),g2=parseInt(floorFlashCol.slice(3,5),16),b2=parseInt(floorFlashCol.slice(5,7),16);
    ctx.fillStyle='rgba('+r2+','+g2+','+b2+','+(floorFlash*.3)+')';
    ctx.fillRect(0,0,W,H);
  }
  /* onda de transición (ripple) */
  if(floorRipple>0){
    const rr=(1-floorRipple)*Math.max(W,H)*.8;
    ctx.strokeStyle=floorFlashCol;ctx.lineWidth=4;ctx.globalAlpha=floorRipple*.5;
    ctx.beginPath();ctx.arc(W/2,H/2,rr,0,6.283);ctx.stroke();
    ctx.strokeStyle=floorFlashCol;ctx.lineWidth=2;ctx.globalAlpha=floorRipple*.3;
    ctx.beginPath();ctx.arc(W/2,H/2,rr*.7,0,6.283);ctx.stroke();
    ctx.globalAlpha=1;
  }
}
function drawJugador(){
  const x=P.x,y=P.y,d=P.dir,t=tiempo;
  const moving=P.dashing>0||Math.abs(inputVec().x)+Math.abs(inputVec().y)>.1;
  const bob=moving?Math.sin(t*11)*2:Math.sin(t*2)*.6;
  if(P.stealth)ctx.globalAlpha=.3;
  else if(P.inv>0&&Math.floor(P.inv*20)%2===0)ctx.globalAlpha=.4;
  /* sombra */
  ctx.fillStyle='#00000055';
  ctx.beginPath();ctx.ellipse(x,y+18,16+(moving?2:0),5,0,0,6.283);ctx.fill();
  /* swing effect */
  const A=armaEf();
  const spin=P.swing>0&&(A.tipo==='spin'||A.tipo==='slam');
  if(P.swing>0){
    ctx.save();ctx.translate(x,y);
    if(A.tipo==='orb'){
      const ox=Math.cos(P.swingAng)*28,oy=Math.sin(P.swingAng)*28;
      ctx.fillStyle='#8B7CF044';ctx.beginPath();ctx.arc(ox,oy,14,0,6.283);ctx.fill();
      ctx.fillStyle='#8B7CF0aa';ctx.beginPath();ctx.arc(ox,oy,6,0,6.283);ctx.fill();
    } else if(A.tipo==='thrust'){
      ctx.strokeStyle='#E8E6DD33';ctx.lineWidth=10;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(P.swingAng)*rangef(),Math.sin(P.swingAng)*rangef());
      ctx.stroke();ctx.lineCap='butt';
    } else if(spin){
      ctx.strokeStyle='#E8E6DD22';ctx.lineWidth=14;
      ctx.beginPath();ctx.arc(0,0,rangef()*.8,0,6.283);ctx.stroke();
    } else {
      ctx.fillStyle='#E8E6DD22';
      ctx.beginPath();ctx.moveTo(0,0);
      ctx.arc(0,0,rangef(),P.swingAng-A.arc/2,P.swingAng+A.arc/2);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
  }
  /* sprite (offscreen canvas — siempre disponible, sin flickering) */
  const walkFrame=moving&&Math.floor(t*4)%2===1;
  const sprKey=esMaga()?(walkFrame?'mw':'mi'):esNecro()?(walkFrame?'nw':'ni'):esBerserker()?(walkFrame?'bw':'bi'):esAsesina()?(walkFrame?'aw':'ai'):(walkFrame?'kw':'ki');
  const spr=SPRITES[sprKey];
  const sprW=spr.width,sprH=spr.height;
  const isHQ=sprW>=48;
  const scale=isHQ?1.452:2.816;   /* -12% (era 1.65 / 3.2) */
  const dw=(isHQ?sprW:24)*scale,dh=(isHQ?sprH:24)*scale;
  ctx.save();
  ctx.translate(x,y+bob-8);
  if(d<0)ctx.scale(-1,1);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(spr,-dw/2,-dh/2,dw,dh);
  ctx.restore();
  /* mage floating orbs */
  if(esMaga()){
    for(let i=0;i<3;i++){
      const oa=t*2.5+i*2.094,or=26+Math.sin(t*3+i)*3;
      const ox=x+Math.cos(oa)*or,oy=y-8+Math.sin(oa)*or*.45;
      ctx.fillStyle='#8B7CF028';ctx.beginPath();ctx.arc(ox,oy,5,0,6.283);ctx.fill();
      ctx.fillStyle='#8B7CF0';ctx.beginPath();ctx.arc(ox,oy,2,0,6.283);ctx.fill();
    }
  }
  ctx.globalAlpha=1;
}
let _camx=0,_camy=0,_W=0,_H=0;
function drawEnemigo(e){
  if(e.x<_camx-80||e.x>_camx+_W+80||e.y<_camy-80||e.y>_camy+_H+80)return;
  const x=e.x,y=e.y,w=Math.sin(e.wob)*2;
  const bi=Math.min(4,Math.floor((piso-1)/5));

  /* sombra */
  ctx.fillStyle='#00000055';
  ctx.beginPath();ctx.ellipse(x,y+e.r*.9,e.r*.85,e.r*.3,0,0,6.283);ctx.fill();

  /* anillo élite */
  if(e.elite&&!e.jefe){
    ctx.strokeStyle='#E8B33C';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x,y+w,e.r+5+Math.sin(e.wob*1.5)*1.5,0,6.283);ctx.stroke();
    if(Math.random()<.06)parts.push({x:x+R(-e.r,e.r),y:y+R(-e.r,e.r),vx:0,vy:-30,life:.4,col:'#E8B33C',r:2});
  }

  /* sprite */
  const sprKey=e.jefe
    ?JEFE_SPR[piso===25?4:((Math.floor((piso-1)/5))%4)]
    :(ENE_SPR[e.n]||'imp');
  const spr=ESPR[sprKey];
  if(spr&&spr.img){
    const frame=Math.floor(tiempo*5)%spr.n;
    const scale=e.jefe?1.936:(e.r>18?1.936:(e.r>13?1.672:1.496));   /* -12% (era 2.2/2.2/1.9/1.7) */
    const dw=spr.w*scale,dh=spr.h*scale;
    /* cache frame canvases on first use */
    if(!spr._fc){spr._fc={};for(let fi=0;fi<spr.n;fi++){const c2=document.createElement('canvas');c2.width=spr.w;c2.height=spr.h;c2.getContext('2d').drawImage(spr.img,fi*spr.w,0,spr.w,spr.h,0,0,spr.w,spr.h);spr._fc[fi]=c2}}
    const fc=spr._fc[frame]||spr.img;
    ctx.save();
    ctx.translate(x,y+w-dh*.15);
    if(e.flash>0){ctx.globalAlpha=.85;ctx.filter='brightness(3)'}
    if(fc===spr.img){ctx.drawImage(fc, frame*spr.w, 0, spr.w, spr.h, -dw/2, -dh/2, dw, dh)}
    else{ctx.drawImage(fc,-dw/2,-dh/2,dw,dh)}
    if(e.flash>0){ctx.filter='none';ctx.globalAlpha=1}
    ctx.restore();
  } else {
    /* fallback: círculo si el sprite no cargó */
    ctx.fillStyle=e.col;ctx.beginPath();ctx.arc(x,y+w,e.r,0,6.283);ctx.fill();
    ctx.strokeStyle='#14161D';ctx.lineWidth=2;ctx.stroke();
  }

  /* corona del jefe */
  if(e.jefe){
    const cr=e.r*.6;
    ctx.fillStyle='#FFD23C';
    ctx.beginPath();
    ctx.moveTo(x-cr,y-e.r*.8+w);
    ctx.lineTo(x-cr*.7,y-e.r*1.2+w);ctx.lineTo(x-cr*.35,y-e.r*.9+w);
    ctx.lineTo(x,y-e.r*1.3+w);
    ctx.lineTo(x+cr*.35,y-e.r*.9+w);ctx.lineTo(x+cr*.7,y-e.r*1.2+w);
    ctx.lineTo(x+cr,y-e.r*.8+w);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#A07B2E';ctx.lineWidth=1.5;ctx.stroke();
  }

  /* barra de HP mini */
  if(e.hp<e.hpMax&&!e.jefe){
    const bw=e.r*2;
    ctx.fillStyle='#000A';ctx.fillRect(x-bw/2,y-e.r-9,bw,4);
    ctx.fillStyle='#D44A42';ctx.fillRect(x-bw/2,y-e.r-9,bw*Math.max(0,e.hp/e.hpMax),4);
  }
}

  else{di.innerHTML='<b>'+L('⚡ Dash listo','⚡ Dash ready')+'</b> ('+L('espacio','space')+')';
    db.style.opacity=1;db.textContent='⚡'}
}

/* ============================================================
   BOT DE QA / AUTOPLAY  ·  activar con  ?bot=1  en la URL
   Lee el estado interno (P, enemigos, gemas, portal, state…),
   juega solo, navega los menús y reporta errores.
   ============================================================ */
(function(){
  try{
    if(!new URLSearchParams(location.search).has('bot')) return;
  }catch(_){ return; }

  /* ---------- estado del bot ---------- */
  const issues=[];
  const seen={};                 /* throttle por type+msg */
  let runCount=0, maxPiso=0, botFrames=0;
  let lastNivel=0, lastSuper=0;
  let prevState='menu', lastUIState='', uiStuck=0;
  let lastFrameTs=performance.now();
  let botOn=true;
  const TICK=70;

  /* ---------- registro de incidencias ---------- */
  function logIssue(type,msg){
    const key=type+'|'+msg;
    const now=performance.now();
    if(seen[key] && now-seen[key]<3000) return;   /* no spamear */
    seen[key]=now;
    const it={ t:+(now/1000).toFixed(1), run:runCount,
               piso:(typeof piso!=='undefined'?piso:'?'),
               nivel:(typeof nivel!=='undefined'?nivel:'?'),
               state:(typeof state!=='undefined'?state:'?'),
               type, msg };
    issues.push(it);
    try{ console.warn('%c[BOT]','color:#E8B33C', type, '·', msg); }catch(_){}
    paintOverlay();
  }

  /* ---------- enganches de error ---------- */
  window.addEventListener('error', e=>{
    logIssue('JS_ERROR', (e.message||'?')+' @ '+(e.filename||'').split('/').pop()+':'+(e.lineno||'?'));
  });
  window.addEventListener('unhandledrejection', e=>{
    logIssue('PROMISE_REJECT', String(e.reason));
  });
  const _ce=console.error;
  console.error=function(){
    try{ logIssue('CONSOLE_ERROR', Array.prototype.map.call(arguments,String).join(' ')); }catch(_){}
    return _ce.apply(console, arguments);
  };

  /* ---------- heartbeat del loop (detectar frames colgados) ---------- */
  try{
    const _draw=draw;
    draw=function(){ botFrames++; lastFrameTs=performance.now(); return _draw.apply(this,arguments); };
  }catch(_){}

  /* ---------- control de movimiento ---------- */
  function clearKeys(){ ['w','a','s','d'].forEach(k=>{ try{keys[k]=false;}catch(_){} }); }
  function setMove(vx,vy){
    clearKeys();
    const th=0.18;
    try{
      if(vy<-th)keys['w']=true; if(vy>th)keys['s']=true;
      if(vx<-th)keys['a']=true; if(vx>th)keys['d']=true;
    }catch(_){}
  }

  /* ---------- cerebro de supervivencia (estilo VS) ---------- */
  function brain(){
    if(typeof P==='undefined'||!P) return;
    let vx=0,vy=0,nearest=Infinity;
    try{
      for(const e of enemigos){
        const dx=P.x-e.x, dy=P.y-e.y, d=Math.hypot(dx,dy)||1;
        if(d<175){ const w=(175-d)/175; vx+=dx/d*w*1.3; vy+=dy/d*w*1.3; }
        if(d<nearest) nearest=d;
      }
    }catch(_){}
    /* portal: prioridad si está abierto */
    try{
      if(typeof portal!=='undefined' && portal){
        const dx=portal.x-P.x, dy=portal.y-P.y, d=Math.hypot(dx,dy)||1;
        vx+=dx/d*1.5; vy+=dy/d*1.5;
      } else if(nearest>80){
        /* recoger gema más cercana cuando es seguro */
        let bg=null,bd=Infinity;
        for(const g of gemas){ const d=Math.hypot(P.x-g.x,P.y-g.y); if(d<bd){bd=d;bg=g;} }
        if(bg){ const dx=bg.x-P.x,dy=bg.y-P.y,d=Math.hypot(dx,dy)||1; vx+=dx/d*0.7; vy+=dy/d*0.7; }
      }
    }catch(_){}
    if(vx===0&&vy===0){ const t=performance.now()/700; vx=Math.cos(t); vy=Math.sin(t); } /* deambular */
    setMove(vx,vy);
    if(nearest<30){ try{tryDash();}catch(_){} }
    if(performance.now()-lastSuper>6000){ try{trySuper();}catch(_){} lastSuper=performance.now(); }
  }

  /* ---------- navegación de menús (usa el DOM real) ---------- */
  function advanceUI(){
    const md=document.getElementById('modal');
    if(!md) return;
    try{
      if(state==='levelup'){
        const c=md.querySelector('.cards .card:not(.disabled)')||md.querySelector('.cards .card');
        if(c)c.click();
      } else if(state==='shop'){
        const cont=Array.prototype.find.call(md.querySelectorAll('button.main'),b=>/Continuar|Continue/.test(b.textContent));
        if(cont)cont.click(); else if(typeof cerrarTienda==='function')cerrarTienda();
      } else if(state==='dead'||state==='menu'){
        const b=md.querySelector('button.main');
        if(b)b.click();
      } else if(state==='pause'){
        if(typeof togglePausa==='function')togglePausa();
      }
    }catch(e){ logIssue('UI_THROW', String(e)); }
  }

  /* ---------- chequeo de invariantes ---------- */
  function checkInvariants(){
    try{
      if(typeof P!=='undefined'&&P){
        if(!isFinite(P.x)||!isFinite(P.y)) logIssue('NAN_POS','P.x/P.y no finito: '+P.x+','+P.y);
        if(!isFinite(P.hp)) logIssue('NAN_HP','P.hp no finito: '+P.hp);
        if(P.hpMax>0 && P.hp>P.hpMax+1) logIssue('HP_OVERFLOW','hp '+Math.round(P.hp)+' > hpMax '+Math.round(P.hpMax));
        if(state==='run' && P.hp<-1) logIssue('HP_NEGATIVE','hp negativo en run sin morir: '+P.hp);
      }
      if(typeof xpNeed!=='undefined' && xpNeed<=0) logIssue('XPNEED_BAD','xpNeed <= 0: '+xpNeed);
      if(typeof nivel!=='undefined'){
        if(state==='run' && nivel<lastNivel) logIssue('LEVEL_DROP','nivel bajó en run: '+lastNivel+'→'+nivel);
        lastNivel=nivel;
      }
      if(typeof enemigos!=='undefined' && enemigos.length>220) logIssue('ENEMY_FLOOD','enemigos.length='+enemigos.length);
      if(typeof gemas!=='undefined'    && gemas.length>600)    logIssue('GEM_FLOOD','gemas.length='+gemas.length);
      if(typeof balas!=='undefined'    && balas.length>1500)   logIssue('BULLET_FLOOD','balas.length='+balas.length);
      if(typeof parts!=='undefined'    && parts.length>6000)   logIssue('PARTS_FLOOD','parts.length='+parts.length);
    }catch(e){ logIssue('CHECK_THROW', String(e)); }
  }

  /* ---------- overlay ---------- */
  let ov;
  function buildOverlay(){
    ov=document.createElement('div');
    ov.style.cssText='position:fixed;top:8px;left:8px;z-index:99999;background:rgba(8,12,18,.86);'
      +'color:#CFE8F5;font:11px/1.45 monospace;padding:8px 10px;border:1px solid #2E6A8A;border-radius:8px;'
      +'min-width:188px;pointer-events:auto;white-space:pre';
    document.body.appendChild(ov);
    const bar=document.createElement('div');
    bar.style.cssText='margin-top:6px;display:flex;gap:6px';
    const mk=(t,fn)=>{ const b=document.createElement('button'); b.textContent=t;
      b.style.cssText='flex:1;font:10px monospace;padding:3px 4px;cursor:pointer;background:#13344a;color:#9BE8FF;border:1px solid #2E6A8A;border-radius:5px';
      b.onclick=fn; return b; };
    bar.appendChild(mk('⏸/▶', ()=>{ botOn=!botOn; if(!botOn)clearKeys(); paintOverlay(); }));
    bar.appendChild(mk('⬇ reporte', downloadReport));
    ov.appendChild(bar);
    ov._txt=document.createElement('div'); ov.insertBefore(ov._txt, bar);
  }
  function paintOverlay(){
    if(!ov) return;
    const last=issues[issues.length-1];
    const errs=issues.filter(i=>/ERROR|NAN|THROW|REJECT|FLOOD|STALL|STUCK|DROP|OVERFLOW|NEGATIVE|BAD/.test(i.type)).length;
    ov._txt.textContent=
      '🤖 BOT QABISMO  '+(botOn?'▶ activo':'⏸ pausa')+'\n'
      +'estado : '+(typeof state!=='undefined'?state:'?')+'\n'
      +'run #'+runCount+'  ·  piso '+(typeof piso!=='undefined'?piso:'?')+'  (máx '+maxPiso+')\n'
      +'nivel '+(typeof nivel!=='undefined'?nivel:'?')+'  ·  kills '+(typeof killsTotal!=='undefined'?killsTotal:'?')+'\n'
      +'hp '+(typeof P!=='undefined'&&P?Math.round(P.hp)+'/'+Math.round(P.hpMax):'?')+'  ·  frames '+botFrames+'\n'
      +'⚠ incidencias: '+errs+(last?'\núlt: '+last.type:'');
  }

  /* ---------- reporte descargable ---------- */
  window.__botReport=function(){
    return { generado:new Date().toISOString(), runs:runCount, maxPiso:maxPiso,
             frames:botFrames, totalIncidencias:issues.length, incidencias:issues };
  };
  function downloadReport(){
    try{
      const blob=new Blob([JSON.stringify(window.__botReport(),null,2)],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob); a.download='abismo-bot-reporte.json'; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),2000);
    }catch(e){ console.warn('[BOT] no se pudo descargar:',e); }
  }

  /* ---------- bucle principal del bot ---------- */
  buildOverlay(); paintOverlay();
  setInterval(()=>{
    if(!botOn) return;
    try{
      /* seguimiento de runs / pisos */
      if(typeof state!=='undefined'){
        if(state==='run'){
          if(prevState!=='run' && (prevState==='menu'||prevState==='dead')) runCount++;
          if(typeof piso!=='undefined') maxPiso=Math.max(maxPiso,piso);
        }
        prevState=state;
      }
      advanceUI();
      if(typeof state!=='undefined' && state==='run') brain(); else clearKeys();
      checkInvariants();

      /* loop colgado */
      if(performance.now()-lastFrameTs>1800)
        logIssue('FRAME_STALL','el loop no dibujó hace >1.8s (posible cuelgue o pestaña en segundo plano)');

      /* atascado en una pantalla de UI */
      if(typeof state!=='undefined'){
        if(state!=='run' && state===lastUIState){
          uiStuck+=TICK;
          if(uiStuck>4500){ logIssue('UI_STUCK','atascado en "'+state+'" >4.5s (el botón no respondió)'); uiStuck=0; }
        } else uiStuck=0;
        lastUIState=state;
      }
      paintOverlay();
    }catch(e){ logIssue('BOT_THROW', String(e&&e.stack||e)); }
  }, TICK);

  console.log('%c🤖 BOT DE QA ACTIVO','color:#9BE8FF;font-weight:bold','— jugando solo. Reporte: window.__botReport()');
})();
</script>
</body>
</html>
